<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>TCSS372 ASIC Design</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main>
        <h1 id="title">{{ page.title }}</h1>
        {% if page.audio %}
        <p>Recording: </p>
        <audio controls>
            <source src="./assets/{{ page.audio }}.mp3" type="audio/mp3">
            AUDIO DIDN'T WORK. AHHHHHHHHHH
        </audio>
        {% endif %}
        <section id="content">
          {% if page.image %}
          <img id="slideImage" src="./assets/{{ page.image }}" alt="{{ page.alt }}">
          {% endif %}
        {{ content }}
        </section>
    </main>
    <footer>
        {% if page.prev %}
        <a href="./{{ page.prev }}" id="prev">Previous</a>
        {% endif %}
        {% if page.next %}
        <a href="./{{ page.next }}" id="next">Next</a>
        {% endif %}
    </footer>
  </body>
</html>
